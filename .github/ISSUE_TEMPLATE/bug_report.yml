name: Bug report
description: Report a reproducible OpenVox Studio problem.
title: '[Bug] '
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide exact steps and, when relevant, the audio-processing mode used.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      description: Include the exact browser version, operating system and device class.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
