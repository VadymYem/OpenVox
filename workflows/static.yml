name: Deploy OpenVox to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve GitHub Pages paths
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"

          if [[ "$REPO_NAME" == "$OWNER.github.io" ]]; then
            BASE_PATH="/"
            PUBLIC_URL="https://${OWNER}.github.io"
          else
            BASE_PATH="/${REPO_NAME}/"
            PUBLIC_URL="https://${OWNER}.github.io/${REPO_NAME}"
          fi

          echo "OPENVOX_BASE=$BASE_PATH" >> "$GITHUB_ENV"
          echo "OPENVOX_PUBLIC_URL=$PUBLIC_URL" >> "$GITHUB_ENV"

      # The uploaded source may have formatting drift.
      # Normalize it inside the build workspace, then enforce the same check.
      - name: Normalize source formatting
        run: |
          npm exec prettier -- --write             "src/**/*.{ts,tsx,css}"             "tests/**/*.{ts,tsx}"             "*.{ts,js,json,md}"             "docs/**/*.md"             ".github/**/*.{yml,yaml,md}"

      - name: Check formatting
        run: npm run format:check

      - name: Lint source
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Verify direct dependency declarations
        run: npm run check:deps

      - name: Check public JavaScript syntax
        run: npm run check:public

      - name: Run tests
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Verify production build
        run: npm run verify

      - name: Reject raw-source deployment artifacts
        shell: bash
        run: |
          if grep -R --line-number --fixed-strings '%BASE_URL%' dist; then
            echo 'Unresolved Vite BASE_URL token found in dist.' >&2
            exit 1
          fi

          if grep -R --line-number --fixed-strings '/src/main.tsx' dist; then
            echo 'Raw Vite source entry found in dist.' >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
