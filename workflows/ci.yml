name: Quality checks

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      OPENVOX_BASE: /OpenVox/
      OPENVOX_PUBLIC_URL: https://vadymyem.github.io/OpenVox
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint source
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Verify direct dependency declarations
        run: npm run check:deps

      - name: Check public JavaScript syntax
        run: npm run check:public

      - name: Verify dependency SBOM
        run: |
          npm run sbom
          git diff --exit-code -- sbom.cdx.json

      - name: Run test suite
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Verify build
        run: npm run verify

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
