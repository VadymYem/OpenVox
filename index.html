  <head>
    <meta charset="UTF-8" />
    <script>
      (() => {
        const primary = (navigator.languages?.[0] || navigator.language || 'en').toLowerCase().split(/[-_]/)[0];
        const detectedLanguage = primary === 'uk' ? 'uk' : primary === 'de' ? 'de' : 'en';
        try {
          const savedLanguage = localStorage.getItem('openvox.language');
          const savedTheme = localStorage.getItem('openvox.theme');
          document.documentElement.lang = ['en', 'uk', 'de'].includes(savedLanguage) ? savedLanguage : detectedLanguage;
          document.documentElement.dataset.theme = ['system', 'dark', 'light'].includes(savedTheme) ? savedTheme : 'system';
          if (localStorage.getItem('openvox.analytics') === 'false') {
            window['ga-disable-G-6LN7QL6SP2'] = true;
          }
        } catch {
          document.documentElement.lang = detectedLanguage;
          document.documentElement.dataset.theme = 'system';
        }
      })();
    </script>
